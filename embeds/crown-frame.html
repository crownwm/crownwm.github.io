<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <title>Crown Game Frame</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100dvh;
      min-height: 100%;
      border: 0;
      background: #000;
    }

    .frame-error {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <iframe id="gameFrame" title="Crown game" allow="autoplay; fullscreen; gamepad; pointer-lock; accelerometer; gyroscope; magnetometer; xr-spatial-tracking" allowfullscreen webkitallowfullscreen mozallowfullscreen referrerpolicy="no-referrer-when-downgrade" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-orientation-lock allow-presentation"></iframe>
  <script>
    const params = new URLSearchParams(location.search);
    const target = params.get("src");
    const title = params.get("title") || "Crown game";
    const frame = document.getElementById("gameFrame");

    function showError(message) {
      document.body.innerHTML = '<div class="frame-error"><div><h1>Crown Games</h1><p>' + message + "</p></div></div>";
    }

    try {
      const url = new URL(target || "");
      if (!/^https?:$/.test(url.protocol)) throw new Error("Bad protocol");
      frame.title = title;
      frame.src = url.href;
    } catch (error) {
      showError("This game source is not available.");
    }

    document.addEventListener("click", (event) => {
      const link = event.target.closest?.("a[href]");
      if (!link) return;
      event.preventDefault();
      event.stopPropagation();
    }, true);
  </script>
</body>
</html>
