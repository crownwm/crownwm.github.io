<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crown Apps</title>
  <meta name="theme-color" content="#0b0a12">
  <link rel="icon" href="../favicon.ico?v=20260517-mobile-shell" sizes="any">
  <link rel="stylesheet" href="../styles.css?v=20260517-mobile-shell">
  <style>
    body.app-page {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 10% 0, rgba(124,58,237,.28), transparent 26rem),
        radial-gradient(circle at 82% 10%, rgba(255,212,71,.14), transparent 28rem),
        #0b0a12;
      color: #fff;
      font-family: "Trebuchet MS", "Gill Sans", Verdana, sans-serif;
    }

    .app-shell {
      width: min(920px, calc(100% - 24px));
      margin: 0 auto;
      padding: 18px 0 90px;
    }

    .app-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .app-top a,
    .tool button {
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      padding: 11px 16px;
      text-decoration: none;
    }

    .app-card-panel {
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 24px;
      background: rgba(18,16,27,.94);
      box-shadow: 0 28px 80px rgba(0,0,0,.38);
      overflow: hidden;
    }

    .app-hero {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 22px;
      border-bottom: 1px solid rgba(255,255,255,.1);
      background:
        linear-gradient(135deg, rgba(139,92,246,.22), rgba(255,212,71,.08)),
        #151323;
    }

    .app-hero-icon {
      display: grid;
      place-items: center;
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #ffd447, #8b5cf6);
      color: #111;
      font-size: 32px;
      font-weight: 1000;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.36);
    }

    .app-hero h1 {
      margin: 0;
      font-size: clamp(30px, 7vw, 58px);
      line-height: .94;
    }

    .app-hero p {
      margin: 8px 0 0;
      color: #c9c2d9;
      font-weight: 800;
    }

    .tool {
      display: grid;
      gap: 14px;
      padding: 20px;
    }

    .tool input,
    .tool textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font: inherit;
      font-weight: 800;
      padding: 13px 14px;
      outline: none;
    }

    .tool textarea {
      min-height: 260px;
      resize: vertical;
    }

    .tool-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .result,
    .saved-list {
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      background: rgba(255,255,255,.06);
      color: #f8f7ff;
      padding: 14px;
      font-weight: 900;
    }

    .draw-pad {
      width: 100%;
      height: min(62vh, 460px);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 18px;
      background: #fff;
      touch-action: none;
    }

    .timer-display {
      font-size: clamp(42px, 14vw, 108px);
      font-weight: 1000;
      letter-spacing: -0.06em;
      color: #ffd447;
    }

    .saved-list article {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-top: 1px solid rgba(255,255,255,.1);
    }

    .saved-list article:first-child {
      border-top: 0;
    }
  </style>
</head>
<body class="app-page">
  <main class="app-shell">
    <div class="app-top">
      <a href="../index.html">Back to Crown Games</a>
      <strong>Crown Apps</strong>
    </div>
    <section class="app-card-panel">
      <header class="app-hero">
        <span class="app-hero-icon" id="heroIcon">C</span>
        <div>
          <h1 id="appTitle">Crown App</h1>
          <p id="appDescription">A local Crown utility.</p>
        </div>
      </header>
      <div class="tool" id="tool"></div>
    </section>
  </main>

  <script>
    const CUSTOM_APPS_KEY = "crownCustomAppsV1";
    const NOTES_KEY = "crownNotesV1";
    const CHECKLIST_KEY = "crownChecklistV1";
    const params = new URLSearchParams(location.search);
    const appId = params.get("app") || "create";
    const baseApps = {
      create: ["+", "Create an App", "Make your own Crown app shortcut on this device."],
      notes: ["N", "Notes", "A quick saved notes pad."],
      calculator: ["C", "Calculator", "Simple calculator for fast math."],
      draw: ["D", "Draw", "Sketch pad with touch support."],
      timer: ["T", "Timer", "Stopwatch and timer controls."],
      checklist: ["L", "Checklist", "Save small task lists locally."]
    };
    const tool = document.getElementById("tool");

    function loadJson(key, fallback) {
      try {
        return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
      } catch (error) {
        return fallback;
      }
    }

    function saveJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function customApps() {
      const apps = loadJson(CUSTOM_APPS_KEY, []);
      return Array.isArray(apps) ? apps : [];
    }

    function safeHtml(value = "") {
      return String(value).replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[ch]);
    }

    function setHeader(icon, title, description) {
      document.getElementById("heroIcon").textContent = String(icon || "C").slice(0, 2).toUpperCase();
      document.getElementById("appTitle").textContent = title;
      document.getElementById("appDescription").textContent = description;
      document.title = title + " - Crown Apps";
    }

    function renderCreate() {
      const saved = customApps();
      tool.innerHTML =
        '<input id="newTitle" placeholder="App name">' +
        '<input id="newDescription" placeholder="Short description">' +
        '<input id="newIcon" maxlength="2" placeholder="Icon letters, like TV">' +
        '<div class="tool-row"><button id="saveApp" type="button">Save App</button></div>' +
        '<div class="saved-list" id="savedApps">' +
        (saved.length ? saved.map((app) => '<article><span><strong>' + safeHtml(app.title) + '</strong><br><small>' + safeHtml(app.description) + '</small></span><a href="?app=' + encodeURIComponent(app.id) + '">Open</a></article>').join("") : "No custom apps yet.") +
        "</div>";
      document.getElementById("saveApp").addEventListener("click", () => {
        const title = document.getElementById("newTitle").value.trim();
        if (!title) return;
        const description = document.getElementById("newDescription").value.trim() || "Custom Crown app.";
        const icon = document.getElementById("newIcon").value.trim() || title.slice(0, 1);
        const id = "custom-" + Date.now().toString(36);
        saveJson(CUSTOM_APPS_KEY, [...customApps(), { id, title, description, icon }]);
        renderCreate();
      });
    }

    function renderNotes() {
      tool.innerHTML = '<textarea id="notes" placeholder="Type notes here..."></textarea><div class="result">Saved automatically on this browser.</div>';
      const notes = document.getElementById("notes");
      notes.value = localStorage.getItem(NOTES_KEY) || "";
      notes.addEventListener("input", () => localStorage.setItem(NOTES_KEY, notes.value));
    }

    function renderCalculator() {
      tool.innerHTML = '<input id="calc" inputmode="decimal" placeholder="Example: (18 + 24) / 2"><div class="tool-row"><button id="runCalc" type="button">Calculate</button></div><div class="result" id="calcResult">Answer shows here.</div>';
      document.getElementById("runCalc").addEventListener("click", () => {
        const expression = document.getElementById("calc").value.trim();
        const result = document.getElementById("calcResult");
        if (!/^[0-9+\-*/(). %]+$/.test(expression)) {
          result.textContent = "Only numbers and math symbols are allowed.";
          return;
        }
        try {
          result.textContent = String(Function("return (" + expression + ")")());
        } catch (error) {
          result.textContent = "Could not calculate that.";
        }
      });
    }

    function renderDraw() {
      tool.innerHTML = '<canvas class="draw-pad" id="drawPad"></canvas><div class="tool-row"><button id="clearDraw" type="button">Clear</button></div>';
      const canvas = document.getElementById("drawPad");
      const context = canvas.getContext("2d");
      let drawing = false;
      function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.max(320, Math.floor(rect.width * devicePixelRatio));
        canvas.height = Math.max(260, Math.floor(rect.height * devicePixelRatio));
        context.scale(devicePixelRatio, devicePixelRatio);
        context.lineWidth = 5;
        context.lineCap = "round";
        context.strokeStyle = "#111827";
      }
      function point(event) {
        const rect = canvas.getBoundingClientRect();
        return { x: event.clientX - rect.left, y: event.clientY - rect.top };
      }
      resize();
      window.addEventListener("resize", resize);
      canvas.addEventListener("pointerdown", (event) => {
        drawing = true;
        canvas.setPointerCapture(event.pointerId);
        const p = point(event);
        context.beginPath();
        context.moveTo(p.x, p.y);
      });
      canvas.addEventListener("pointermove", (event) => {
        if (!drawing) return;
        const p = point(event);
        context.lineTo(p.x, p.y);
        context.stroke();
      });
      canvas.addEventListener("pointerup", () => drawing = false);
      canvas.addEventListener("pointercancel", () => drawing = false);
      document.getElementById("clearDraw").addEventListener("click", () => context.clearRect(0, 0, canvas.width, canvas.height));
    }

    function renderTimer() {
      let elapsed = 0;
      let started = 0;
      let tick = 0;
      tool.innerHTML = '<div class="timer-display" id="timerDisplay">00:00.0</div><div class="tool-row"><button id="startTimer" type="button">Start</button><button id="pauseTimer" type="button">Pause</button><button id="resetTimer" type="button">Reset</button></div>';
      const display = document.getElementById("timerDisplay");
      function paint() {
        const total = elapsed + (started ? performance.now() - started : 0);
        const minutes = Math.floor(total / 60000).toString().padStart(2, "0");
        const seconds = Math.floor((total % 60000) / 1000).toString().padStart(2, "0");
        const tenth = Math.floor((total % 1000) / 100);
        display.textContent = minutes + ":" + seconds + "." + tenth;
      }
      document.getElementById("startTimer").addEventListener("click", () => {
        if (started) return;
        started = performance.now();
        tick = setInterval(paint, 80);
      });
      document.getElementById("pauseTimer").addEventListener("click", () => {
        if (started) elapsed += performance.now() - started;
        started = 0;
        clearInterval(tick);
        paint();
      });
      document.getElementById("resetTimer").addEventListener("click", () => {
        elapsed = 0;
        started = 0;
        clearInterval(tick);
        paint();
      });
    }

    function renderChecklist() {
      let items = loadJson(CHECKLIST_KEY, []);
      function paint() {
        tool.innerHTML = '<div class="tool-row"><input id="itemText" placeholder="Add an item"><button id="addItem" type="button">Add</button></div><div class="saved-list">' +
          (items.length ? items.map((item, index) => '<article><label><input type="checkbox" data-index="' + index + '"' + (item.done ? " checked" : "") + '> ' + safeHtml(item.text) + '</label><button type="button" data-remove="' + index + '">Remove</button></article>').join("") : "No checklist items yet.") +
          "</div>";
        document.getElementById("addItem").addEventListener("click", () => {
          const input = document.getElementById("itemText");
          if (!input.value.trim()) return;
          items.push({ text: input.value.trim(), done: false });
          saveJson(CHECKLIST_KEY, items);
          paint();
        });
      }
      tool.addEventListener("change", (event) => {
        const checkbox = event.target.closest("input[data-index]");
        if (!checkbox) return;
        items[Number(checkbox.dataset.index)].done = checkbox.checked;
        saveJson(CHECKLIST_KEY, items);
      });
      tool.addEventListener("click", (event) => {
        const remove = event.target.closest("button[data-remove]");
        if (!remove) return;
        items.splice(Number(remove.dataset.remove), 1);
        saveJson(CHECKLIST_KEY, items);
        paint();
      });
      paint();
    }

    function renderCustom(app) {
      tool.innerHTML = '<div class="result">This custom app is saved on this browser. Use Create an App to make more local Crown shortcuts.</div>';
      setHeader(app.icon, app.title, app.description);
    }

    const custom = customApps().find((app) => app.id === appId);
    const meta = custom ? [custom.icon, custom.title, custom.description] : baseApps[appId] || baseApps.create;
    setHeader(meta[0], meta[1], meta[2]);
    if (custom) renderCustom(custom);
    else if (appId === "notes") renderNotes();
    else if (appId === "calculator") renderCalculator();
    else if (appId === "draw") renderDraw();
    else if (appId === "timer") renderTimer();
    else if (appId === "checklist") renderChecklist();
    else renderCreate();

    document.addEventListener("click", (event) => {
      const link = event.target.closest && event.target.closest("a[href]");
      if (!link) return;
      const url = new URL(link.getAttribute("href"), location.href);
      if (url.origin === location.origin) return;
      event.preventDefault();
      event.stopPropagation();
    }, true);
  </script>
</body>
</html>
