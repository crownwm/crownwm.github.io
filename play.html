<body class="play-page">
  <header class="playbar">
    <a href="index.html" class="back">&lt; Crown Games</a>
    <div><strong id="playTitle">Loading...</strong><span id="playMeta"></span></div>
    <nav class="play-actions" aria-label="Game controls">
      <button id="favoriteToggle" class="play-action favorite-toggle" type="button" aria-pressed="false">Favorite</button>
      <button id="reloadGame" class="play-action" type="button">Reload</button>
      <button id="fullscreenToggle" class="play-action" type="button">Fullscreen</button>
      <button id="fitToggle" class="play-action fit-toggle" type="button">Fill</button>
      <button id="settingsButton" class="play-action settings-button" type="button" aria-haspopup="dialog">Settings</button>
    </nav>
  </header>
  <main class="player-shell">
    <div id="player" class="player fit-mode"></div>
    <div id="gameLoader" class="game-loader is-active" aria-live="polite" aria-label="Loading game">
      <div class="loader-card">
        <span class="loader-ring"></span>
        <span class="loader-icon">
          <img id="loaderIcon" src="assets/crown-logo.svg" alt="">
        </span>
        <strong id="loaderTitle">Loading Crown Game</strong>
        <small>getting the game ready</small>
      </div>
    </div>
  </main>
  <footer class="credit-footer">
    <p>&copy; 2026 Crown Games. Made by Wes &amp; Mason.</p>
  </footer>
  <script src="settings.js?v=20260517-ipad-speed"></script>
  <script src="data/games.js?v=20260517-ipad-speed"></script>
  <script src="play.js?v=20260517-ipad-speed"></script>
</body>
</html>
